name: daily-predictions

on:
  schedule:
    - cron: '0 6 * * *'      # 06:00 UTC every day
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python run_daily.py
        env:
          FOOTBALL_DATA_TOKEN:        ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMPETITION:      'PL'             # PL = Premier League
          HISTORY_SEASONS:  '2023,2024,2025'
          DAYS_AHEAD:       '3'             # set high for first test, then back to 3
